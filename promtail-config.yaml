server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: MS-Payments
    static_configs:
      - targets: [localhost]
        labels:
          job: MS-Payments
          __path__: /app/MS-Payments/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            ts: '"@timestamp"'
            level: level
            service: service_name
            correlation: correlation_id
      - timestamp:
          source: ts
          format: RFC3339Nano

  - job_name: MS-Wallet
    static_configs:
      - targets: [localhost]
        labels:
          job: MS-Wallet
          __path__: /app/MS-Wallet/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            ts: '"@timestamp"'
            level: level
            service: service_name
            correlation: correlation_id
      - timestamp:
          source: ts
          format: RFC3339Nano

  - job_name: MS-User
    static_configs:
      - targets: [localhost]
        labels:
          job: MS-User
          __path__: /app/MS-User/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            ts: '"@timestamp"'
            level: level
            service: service_name
            correlation: correlation_id
      - timestamp:
          source: ts
          format: RFC3339Nano
